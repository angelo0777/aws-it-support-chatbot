<!DOCTYPE html>
<html>
<head>
<title>IT Support Chatbot</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat-container{
width:400px;
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.chat-header{
background:#4a6cf7;
color:white;
padding:15px;
font-size:18px;
border-radius:10px 10px 0 0;
}

.chatbox{
height:300px;
overflow-y:auto;
padding:10px;
}

.message{
margin:8px 0;
}

.user{
text-align:right;
color:#333;
}

.bot{
text-align:left;
color:#4a6cf7;
}

.input-area{
display:flex;
border-top:1px solid #eee;
}

input{
flex:1;
padding:10px;
border:none;
outline:none;
}

button{
background:#4a6cf7;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
}

button:hover{
background:#3a56d6;
}

</style>

</head>

<body>

<div class="chat-container">

<div class="chat-header">
IT Support Assistant
</div>

<div id="chatbox" class="chatbox"></div>

<div class="input-area">
<input id="userInput" placeholder="Ask your IT question..." />
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

function sendMessage(){

let input=document.getElementById("userInput").value;
let chat=document.getElementById("chatbox");

chat.innerHTML += `<div class="message user"><b>You:</b> ${input}</div>`;
chat.innerHTML += `<div class="message bot"><b>Bot:</b> Processing...</div>`;

document.getElementById("userInput").value="";

chat.scrollTop=chat.scrollHeight;

}

</script>

</body>
</html>
